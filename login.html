<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — All Nations Notion Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
  <style>
    :root {
      --bg:           #F7F7F5;
      --surface:      #FFFFFF;
      --border:       #E9E9E7;
      --text-primary: #111111;
      --text-secondary:#666666;
      --text-muted:   #999999;
      --accent:       #CB5928;
      --shadow-md:    0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --radius-lg:    16px;
      --t-fast:       0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 36px 40px 32px;
      width: 100%;
      max-width: 460px;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-align: center;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: contain;
    }
    .logo-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .card-title    { font-size: 20px; font-weight: 700; line-height: 1.2; }
    .card-subtitle { font-size: 13px; color: var(--text-secondary); }

    /* Strip Clerk's outer card so it sits flush inside ours */
    #sign-in .cl-card,
    #sign-in .cl-cardBox {
      box-shadow: none !important;
      border: none !important;
      padding: 0 !important;
      background: transparent !important;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 20px;
      text-decoration: none;
      transition: color var(--t-fast);
      justify-content: center;
    }
    .back-link:hover { color: var(--text-primary); }

    .loading {
      text-align: center;
      padding: 32px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo-wrap">
      <img src="anlogo.png" class="logo-img" alt="All Nations">
      <span class="logo-text">All Nations Church</span>
    </div>
    <div>
      <div class="card-title">Sign in</div>
      <div class="card-subtitle">Notion Onboarding Dashboard</div>
    </div>
  </div>

  <div id="sign-in"><div class="loading">Loading…</div></div>

  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to the presentation
  </a>
</div>

<script src="auth.js"></script>
<script>
(async () => {
  const clerk = new Clerk(CLERK_PUBLISHABLE_KEY);
  await clerk.load();
  window.clerk = clerk;

  if (clerk.user) {
    redirectAfterLogin();
    return;
  }

  clerk.mountSignIn(document.getElementById('sign-in'), {
    afterSignInUrl:  window.location.href,
    afterSignUpUrl:  window.location.href,
    appearance: {
      variables: {
        colorPrimary:    '#CB5928',
        colorBackground: '#FFFFFF',
        colorText:       '#111111',
        borderRadius:    '8px',
        fontFamily:      'Inter, system-ui, sans-serif',
        fontSize:        '14px',
      }
    }
  });

  function redirectAfterLogin() {
    const role = clerk.user?.publicMetadata?.role;
    window.location.href = role === 'admin' ? 'admin.html' : 'dashboard.html';
  }
})();
</script>

</body>
</html>
